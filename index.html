    <script>
      // Notification + Sound for new apartments
      (function() {
        let lastCount = -1;
        const SOUND_URL = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAAD/AP8A/wD/AP8A/wD+AP4A/gD+APwA/AD8APwA+gD6APoA+gD4APgA+AD4APYA9gD2APYA9ADzAPQA9ADyAPIA8gDyAPAA8ADwAPAA7gDuAO4A7gDsAOwA7ADsAOoA6gDqAOoA6ADmAOYA5gDkAOIA4gDiAOAA3gDeAN4A3ADYANQA1ADQAM4AzADKAMgAxgDCAMIAwAC+ALwAugC6ALgAtgC0ALQAsgCwALAAsgC4AL4AxADKANIA2ADeAOQA6gDwAPQA+AD6APwA/AD8APwA/AD8APwA/AD+AP4A/gD+AP4AAAEAAQABAAEAAQABAgECAQIBAgECAQIBAgECAQIBAgECAQIBAgEAAQABAAEAAQABAAH+AP4A/gD+APwA/AD8APwA+gD6APoA+gD4APgA+AD4APYA9gD0APQA';

        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }

        function playSound() {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            // Play a pleasant notification chime
            [523.25, 659.25, 783.99].forEach((freq, i) => {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.frequency.value = freq;
              osc.type = 'sine';
              gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
              gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
              osc.start(ctx.currentTime + i * 0.15);
              osc.stop(ctx.currentTime + i * 0.15 + 0.4);
            });
          } catch(e) {}
        }

        function checkNew() {
          fetch('/api/apartments')
            .then(r => r.json())
            .then(apts => {
              const newApts = apts.filter(a => a.isNew);
              const count = newApts.length;
              if (lastCount === -1) { lastCount = count; return; }
              if (count > lastCount) {
                const diff = count - lastCount;
                document.title = '🔴 ' + diff + ' شقة جديدة! - شقق بوكستيهودة 2026';
                playSound();
                if ('Notification' in window && Notification.permission === 'granted') {
                  const n = new Notification('🏠 شقق جديدة في بوكستيهودة!', {
                    body: diff + ' شقة جديدة متاحة الآن',
                    icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"%3E%3Crect x="4" y="18" width="32" height="18" rx="2" fill="%234b8bf4" opacity="0.3"/%3E%3Cpath d="M20 4 L36 18 L4 18 Z" fill="%234b8bf4"/%3E%3C/svg%3E',
                    requireInteraction: true
                  });
                  n.onclick = () => { window.focus(); n.close(); };
                }
                setTimeout(() => { document.title = 'شقق بوكستيهودة 2026'; }, 30000);
              }
              lastCount = count;
            })
            .catch(() => {});
        }

        setInterval(checkNew, 60000); // check every 1 minute
        setTimeout(checkNew, 3000); // initial check after 3s
      })();
    </script>

  <script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
