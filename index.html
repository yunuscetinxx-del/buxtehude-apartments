    <style>
      /* ==================== Theme Variables ==================== */
      html.dark {
        --bg-primary: #0a0f1a;
        --bg-secondary: #111827;
        --bg-surface: #1e293b;
        --bg-surface-hover: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --border-color: #334155;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --success: #34d399;
        --danger: #ef4444;
        --shadow: rgba(0,0,0,0.3);
        --overlay-bg: rgba(0,0,0,0.6);
      }
      html.light {
        --bg-primary: #f0f4f8;
        --bg-secondary: #ffffff;
        --bg-surface: #ffffff;
        --bg-surface-hover: #f1f5f9;
        --text-primary: #1e293b;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --border-color: #e2e8f0;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --success: #059669;
        --danger: #dc2626;
        --shadow: rgba(0,0,0,0.06);
        --overlay-bg: rgba(0,0,0,0.4);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', 'Tajawal', sans-serif;
        transition: background 0.3s;
      }
      html[dir="rtl"] body { font-family: 'Tajawal', 'Inter', sans-serif; }

      /* ==================== Main Navigation ==================== */
      #main-nav {
        position: sticky;
        top: 0;
        z-index: 9999;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-color);
        padding: 0 24px;
        height: 62px;
        display: flex;
        align-items: center;
        gap: 18px;
        font-family: 'Inter', 'Tajawal', sans-serif;
        box-shadow: 0 1px 6px var(--shadow);
      }
      html[dir="rtl"] #main-nav { font-family: 'Tajawal', 'Inter', sans-serif; }

      /* Logo / Brand pill */
      .nav-brand {
        display: flex;
        align-items: center;
        flex-shrink: 0;
        text-decoration: none;
        cursor: pointer;
      }
      .nav-brand-logo {
        background: var(--accent);
        color: #fff;
        padding: 7px 14px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: -0.3px;
        display: flex;
        align-items: center;
        gap: 7px;
        white-space: nowrap;
        line-height: 1;
        transition: opacity 0.18s;
      }
      .nav-brand-logo:hover { opacity: 0.88; }
      .nav-brand-logo .nav-brand-icon { font-size: 17px; }

      /* City Search */
      .city-search-wrapper {
        position: relative;
        flex: 1;
        max-width: 500px;
      }
      .city-search-wrapper input {
        width: 100%;
        padding: 9px 46px 9px 18px;
        border-radius: 24px;
        border: 1.5px solid var(--border-color);
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      html[dir="rtl"] .city-search-wrapper input { padding: 9px 18px 9px 46px; }
      .city-search-wrapper input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
      }
      .city-search-wrapper input::placeholder { color: var(--text-muted); }
      #city-search-btn {
        position: absolute;
        right: 5px; top: 50%;
        transform: translateY(-50%);
        background: var(--accent);
        color: #fff;
        border: none;
        width: 32px; height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 14px;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
      }
      html[dir="rtl"] #city-search-btn { right: auto; left: 5px; }
      #city-search-btn:hover { background: var(--accent-hover); }
      #city-search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .city-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 6px); left: 0; right: 0;
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        max-height: 300px;
        overflow-y: auto;
        z-index: 10000;
        box-shadow: 0 8px 30px var(--shadow);
      }
      .city-dropdown.active { display: block; }
      .city-dropdown-item {
        padding: 10px 18px;
        cursor: pointer;
        color: var(--text-primary);
        font-size: 14px;
        transition: background 0.15s;
        border-bottom: 1px solid var(--border-color);
      }
      .city-dropdown-item:last-child { border-bottom: none; }
      .city-dropdown-item:hover, .city-dropdown-item.selected { background: var(--bg-surface-hover); }
      .city-dropdown-item .monitored-badge {
        font-size: 10px;
        background: var(--accent);
        color: #fff;
        padding: 1px 6px;
        border-radius: 6px;
        margin-inline-start: 8px;
      }

      /* Vertical divider before actions */
      .nav-divider {
        width: 1px;
        height: 26px;
        background: var(--border-color);
        flex-shrink: 0;
      }

      /* Nav action buttons */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .nav-btn {
        padding: 7px 13px;
        border-radius: 8px;
        border: 1.5px solid transparent;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.18s;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }
      .nav-btn:hover {
        background: var(--bg-surface-hover);
        color: var(--text-primary);
      }
      .nav-btn.active { background: var(--accent); color: #fff; }

      /* Semantic colour variants */
      .nav-btn-green {
        background: #ecfdf5; border-color: #a7f3d0; color: #065f46;
      }
      html.dark .nav-btn-green {
        background: #064e3b; border-color: #065f46; color: #6ee7b7;
      }
      .nav-btn-green:hover { background: #d1fae5; border-color: #6ee7b7; }
      html.dark .nav-btn-green:hover { background: #065f46; }

      .nav-btn-blue {
        background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8;
      }
      html.dark .nav-btn-blue {
        background: #1e3a5f; border-color: #3b82f6; color: #93c5fd;
      }
      .nav-btn-blue:hover { background: #dbeafe; border-color: #93c5fd; }
      html.dark .nav-btn-blue:hover { background: #1e40af; }

      .nav-btn-red {
        background: #fef2f2; border-color: #fecaca; color: #b91c1c;
      }
      html.dark .nav-btn-red {
        background: #7f1d1d; border-color: #991b1b; color: #fca5a5;
      }
      .nav-btn-red:hover { background: #fee2e2; border-color: #fca5a5; }
      html.dark .nav-btn-red:hover { background: #991b1b; }

      .area-count {

      .nav-btn-red .area-count,
      .nav-btn-blue .area-count,
      .nav-btn-green .area-count {
        background: rgba(0,0,0,0.12);
        color: inherit;
        opacity: 1;
        font-weight: 700;
      }

      /* Monitor Area Filter Bar */
      #monitor-bar {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: 'Inter', 'Tajawal', sans-serif;
      }
      html[dir="rtl"] #monitor-bar { font-family: 'Tajawal', 'Inter', sans-serif; }
      .area-btn {
        padding: 6px 16px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background: var(--bg-surface);
        color: var(--text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
      }
      .area-btn:hover { background: var(--bg-surface-hover); border-color: var(--accent); }
      .area-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

      /* ==================== Search Results ==================== */
      #search-results {
        display: none;
        padding: 0 16px 32px;
        max-width: 1400px;
        margin: 0 auto;
      }
      #search-results.active { display: block; }
      .search-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px 0 8px;
      }
      .search-back-btn {
        padding: 8px 18px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--bg-surface);
        color: var(--text-primary);
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .search-back-btn:hover { border-color: var(--accent); background: var(--bg-surface-hover); }
      .search-info h2 {
        color: var(--text-primary);
        font-size: 20px;
        margin: 0;
        font-weight: 700;
      }
      .search-info span { color: var(--text-secondary); font-size: 13px; }
      .search-source-filter {
        display: flex;
        gap: 8px;
        padding: 8px 0 16px;
        flex-wrap: wrap;
      }
      .search-source-btn {
        padding: 6px 14px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        background: var(--bg-surface);
        color: var(--text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .search-source-btn:hover { border-color: var(--accent); }
      .search-source-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
      }
      @media (max-width: 640px) { .card-grid { grid-template-columns: 1fr; } }
      /* ==================== Search Result Cards (ImmoScout style) ==================== */
      .s-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
        transition: box-shadow 0.2s, transform 0.15s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
      }
      .s-card:hover {
        box-shadow: 0 6px 24px rgba(0,0,0,0.13);
        transform: translateY(-2px);
      }
      /* Image container */
      .s-card-media {
        position: relative;
        width: 100%;
        height: 200px;
        overflow: hidden;
        flex-shrink: 0;
        background: var(--bg-secondary);
      }
      .s-card-media img {
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s;
      }
      .s-card:hover .s-card-media img { transform: scale(1.03); }
      /* No-image placeholder */
      .s-card-no-img {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, var(--bg-surface), var(--bg-secondary));
        color: var(--text-muted); font-size: 48px;
      }
      /* Top-left overlay: source badge */
      .s-card-source-badge {
        position: absolute; top: 10px; left: 10px;
        font-size: 11px; font-weight: 700;
        padding: 3px 10px; border-radius: 20px;
        backdrop-filter: blur(2px);
        pointer-events: none;
      }
      /* Top-right overlay: favourite heart */
      .s-card-fav {
        position: absolute; top: 10px; right: 10px;
        width: 32px; height: 32px;
        background: rgba(255,255,255,0.88);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; color: #9ca3af;
        cursor: pointer;
        transition: color 0.2s, background 0.2s;
        box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      }
      .s-card-fav:hover { color: #ef4444; background: #fff; }
      /* Bottom-right overlay: image counter */
      .s-card-counter {
        position: absolute; bottom: 10px; right: 10px;
        background: rgba(0,0,0,0.62);
        color: #fff; font-size: 11px; font-weight: 600;
        padding: 2px 8px; border-radius: 20px;
        pointer-events: none;
      }
      /* Card content */
      .s-card-body {
        padding: 14px 16px 16px;
        display: flex; flex-direction: column; gap: 4px;
        flex: 1;
      }
      /* Price row */
      .s-card-price-row {
        display: flex; align-items: center; gap: 8px;
        flex-wrap: wrap;
      }
      .s-card-price {
        font-size: 20px; font-weight: 800;
        color: var(--text-primary);
        line-height: 1.2;
      }
      .s-card-price-type {
        font-size: 11px; font-weight: 500;
        background: var(--bg-secondary);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        padding: 2px 8px; border-radius: 20px;
      }
      /* Title */
      .s-card-title {
        color: var(--text-primary);
        font-size: 14px; font-weight: 600;
        line-height: 1.4;
        margin: 0;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      /* Details: rooms · size */
      .s-card-details {
        font-size: 13px; color: var(--text-secondary);
        display: flex; align-items: center; gap: 6px;
        flex-wrap: wrap;
      }
      .s-card-details-sep { color: var(--text-muted); }
      /* Location row */
      .s-card-location {
        font-size: 13px; color: #3b82f6;
        display: flex; align-items: center; gap: 4px;
        margin-top: 2px;
      }
      .dark .s-card-location { color: #60a5fa; }
      /* Feature tags */
      .s-card-features {
        display: flex; flex-wrap: wrap; gap: 4px;
        margin-top: 4px;
      }
      .s-card-feat {
        font-size: 10px; padding: 2px 8px; border-radius: 8px;
        background: var(--bg-secondary); color: var(--text-secondary);
        border: 1px solid var(--border-color);
      }

      /* ==================== Loading Overlay ==================== */
      #search-loading {
        display: none; position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: var(--overlay-bg);
        z-index: 10050;
        align-items: center; justify-content: center;
      }
      #search-loading.active { display: flex; }
      .loading-box {
        background: var(--bg-surface);
        border-radius: 20px;
        padding: 40px 50px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }
      .loading-spinner {
        width: 50px; height: 50px;
        border: 4px solid var(--border-color);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text { color: var(--text-primary); font-size: 16px; font-weight: 600; }
      .loading-sub { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }

      /* ==================== Pulse Animation (disabled) ==================== */
      [class*="ring-red-500"] {
        --tw-ring-opacity: 0 !important;
        --tw-ring-color: transparent !important;
        box-shadow: none !important;
        animation: none !important;
      }
      [class*="animate-pulse"] { animation: none !important; }
      [class*="shadow-red"] { --tw-shadow-color: transparent !important; box-shadow: none !important; }

      /* ==================== Modals (shared) ==================== */
      .modal-overlay {
        display: none; position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: var(--overlay-bg);
        z-index: 10000;
      }
      .modal-overlay.active { display: block; }
      .modal-panel {
        display: none; position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10001;
        background: var(--bg-surface);
        border: 2px solid var(--accent);
        border-radius: 16px;
        padding: 24px 28px;
        min-width: 320px;
        font-family: 'Inter', 'Tajawal', sans-serif;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      html[dir="rtl"] .modal-panel { font-family: 'Tajawal', 'Inter', sans-serif; }
      .modal-panel.active { display: block; }
      .modal-panel h3 { color: var(--text-primary); margin: 0 0 16px 0; font-size: 18px; }
      .modal-sub { color: var(--text-secondary); font-size: 13px; margin: 0 0 12px 0; }
      .modal-checkbox {
        display: flex; align-items: center; gap: 10px;
        color: var(--text-secondary); padding: 8px 0; font-size: 15px; cursor: pointer;
      }
      .modal-checkbox input[type="checkbox"] {
        width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;
      }
      .modal-save-btn {
        margin-top: 16px; width: 100%; padding: 10px;
        border-radius: 10px; border: none;
        background: var(--accent); color: #fff;
        font-family: inherit; font-size: 15px; font-weight: 700;
        cursor: pointer; transition: background 0.2s;
      }
      .modal-save-btn:hover { background: var(--accent-hover); }
      .modal-danger-btn {
        width: 100%; padding: 10px; margin-top: 8px;
        border-radius: 10px; border: 1px solid var(--danger);
        background: transparent; color: #fca5a5;
        font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
      }
      .modal-status { font-size: 13px; text-align: center; margin: 8px 0 0 0; display: none; }
      .modal-status.active { display: block; }
      .modal-input {
        width: 100%; padding: 10px 14px; border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--bg-primary); color: var(--text-primary);
        font-family: inherit; font-size: 14px;
        margin-bottom: 12px; direction: ltr; text-align: left;
      }
      .modal-close-btn {
        background: none; border: none; color: var(--text-secondary);
        font-size: 24px; cursor: pointer;
      }
      .modal-empty { color: var(--text-secondary); text-align: center; display: none; }

      /* ==================== Apartment Detail Modal (ImmoScout style) ==================== */
      #apt-detail-overlay {
        display: none; position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: var(--overlay-bg); z-index: 10010;
      }
      #apt-detail-overlay.active { display: block; }
      #apt-detail-modal {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10011;
        background: var(--bg-primary);
        border-radius: 16px;
        width: 90vw; max-width: 1100px;
        height: 90vh;
        overflow: hidden;
        font-family: 'Inter', 'Tajawal', sans-serif;
        box-shadow: 0 25px 80px rgba(0,0,0,0.55);
        display: none;
        flex-direction: column;
      }
      html[dir="rtl"] #apt-detail-modal { font-family: 'Tajawal', 'Inter', sans-serif; }
      #apt-detail-modal.active { display: flex; }
      /* Gallery */
      .adm-gallery {
        position: relative; width: 100%; height: 340px; min-height: 180px;
        overflow: hidden; flex-shrink: 0;
        background: #111;
      }
      .adm-gallery img {
        width: 100%; height: 340px;
        object-fit: contain;
        display: block;
        cursor: zoom-in;
        transition: opacity 0.18s ease;
      }
      .adm-gallery img.fading { opacity: 0; }
      /* Thumbnail strip */
      .adm-thumbs {
        display: flex;
        gap: 6px;
        padding: 8px 10px;
        overflow-x: auto;
        background: var(--bg-secondary);
        scrollbar-width: thin;
        scrollbar-color: var(--border-color) transparent;
        flex-shrink: 0;
      }
      .adm-thumbs::-webkit-scrollbar { height: 4px; }
      .adm-thumbs::-webkit-scrollbar-track { background: transparent; }
      .adm-thumbs::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
      .adm-thumb {
        flex-shrink: 0;
        width: 72px; height: 52px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 0.15s;
        background: #111;
      }
      .adm-thumb.active { border-color: var(--accent); }
      .adm-thumb img {
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
        transition: none;
      }
      .adm-gallery-btn {
        position: absolute; top: 50%; transform: translateY(-50%);
        background: rgba(0,0,0,0.55); border: none;
        color: #fff; font-size: 22px;
        width: 42px; height: 42px; border-radius: 50%;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        backdrop-filter: blur(4px); z-index: 2; transition: background 0.2s;
      }
      .adm-gallery-btn:hover { background: rgba(0,0,0,0.85); }
      .adm-gallery-prev { left: 14px; }
      .adm-gallery-next { right: 14px; }
      .adm-gallery-counter {

              document.title = '\ud83d\udd34 ' + diff + (lang === 'ar' ? ' \u0634\u0642\u0629 \u062c\u062f\u064a\u062f\u0629!' : ' neue Wohnungen!');
              playSound();
              if ('Notification' in window && Notification.permission === 'granted') {
                var n = new Notification(lang === 'ar' ? '\ud83c\udfe0 \u0634\u0642\u0642 \u062c\u062f\u064a\u062f\u0629!' : '\ud83c\udfe0 Neue Wohnungen!', {
                  body: diff + (lang === 'ar' ? ' \u0634\u0642\u0629 \u062c\u062f\u064a\u062f\u0629 \u0645\u062a\u0627\u062d\u0629' : ' neue Wohnungen gefunden'),
                  requireInteraction: true
                });
                n.onclick = function() { window.focus(); n.close(); };
              }
              setTimeout(function() { document.title = 'Wohnungsfinder Deutschland'; }, 30000);
            }
            lastCount = count;
          }).catch(function(){});
        }
        setInterval(checkNew, 60000);
        setTimeout(checkNew, 3000);
      })();
    </script>

    <script>

        function updateThemeBtn() {
          var theme = localStorage.getItem('theme') || 'dark';
          themeBtn.textContent = theme === 'dark' ? '\u2600\ufe0f' : '\ud83c\udf19';
        }
        updateThemeBtn();
        themeBtn.addEventListener('click', function() {
          var current = localStorage.getItem('theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          localStorage.setItem('theme', next);
          document.documentElement.classList.remove('dark', 'light');
          document.documentElement.classList.add(next);
          updateThemeBtn();
        });

        // Language toggle
        var langBtn = document.getElementById('lang-toggle');
        langBtn.addEventListener('click', function() {
          var current = getLang();
          var next = current === 'de' ? 'ar' : 'de';
          localStorage.setItem('lang', next);
          document.documentElement.lang = next;
          document.documentElement.dir = next === 'ar' ? 'rtl' : 'ltr';
          applyI18n();
        });

        // Apply i18n on load
        applyI18n();
      })();
    </script>

    <!-- ==================== Area Filter Logic ==================== -->
    <script>
      (function() {
        var DEFAULT_AREAS = ['Buxtehude', 'Neukloster', 'Neu Wulmstorf'];
        var CITIES_LIST = [
          "Berlin","Hamburg","München","Köln","Frankfurt","Stuttgart","Düsseldorf","Leipzig",
          "Dortmund","Essen","Bremen","Dresden","Hannover","Nürnberg","Duisburg","Bochum",
          "Wuppertal","Bielefeld","Bonn","Münster","Karlsruhe","Mannheim","Augsburg",
          "Wiesbaden","Gelsenkirchen","Mönchengladbach","Braunschweig","Chemnitz","Kiel",
          "Aachen","Halle","Magdeburg","Freiburg","Krefeld","Lübeck","Oberhausen","Erfurt",
          "Mainz","Rostock","Kassel","Hagen","Hamm","Saarbrücken","Mülheim","Potsdam",
          "Ludwigshafen","Oldenburg","Leverkusen","Osnabrück","Solingen","Heidelberg",
          "Darmstadt","Paderborn","Regensburg","Würzburg","Ingolstadt","Ulm","Heilbronn",
          "Buxtehude","Stade","Neu Wulmstorf","Neukloster","Harburg","Lüneburg",
          "Cuxhaven","Celle","Uelzen","Rotenburg","Bamberg","Bayreuth","Passau",
          "Landshut","Rosenheim","Friedrichshafen","Ravensburg","Göppingen","Aalen"
        ];

        // Read custom areas from localStorage, fall back to defaults
        function getMyAreas() {
          try {
            var saved = localStorage.getItem('myAreas');
            if (saved) {
              var arr = JSON.parse(saved);
              if (Array.isArray(arr) && arr.length > 0) return arr;
            }
          } catch(e) {}
          return DEFAULT_AREAS.slice();
        }

        function saveMyAreas(arr) {
          localStorage.setItem('myAreas', JSON.stringify(arr));
        }

        // Build filter buttons dynamically
        var monitorBar = document.getElementById('monitor-bar');
        var myAreasBtn = document.getElementById('my-areas-btn');
        var currentArea = localStorage.getItem('selectedArea') || 'all';

        function buildFilterButtons() {
          // Remove old dynamic buttons (not "all" and not manage-btn)
          monitorBar.querySelectorAll('.area-btn[data-area]:not([data-area="all"])').forEach(function(b) { b.remove(); });

          var areas = getMyAreas();
          var allBtn = monitorBar.querySelector('[data-area="all"]');
          areas.forEach(function(area) {
            var btn = document.createElement('button');
            btn.className = 'area-btn';
            btn.dataset.area = area;
            btn.textContent = area;
            if (area === currentArea) btn.classList.add('active');
            btn.addEventListener('click', function() {
              currentArea = area;
              localStorage.setItem('selectedArea', area);
              monitorBar.querySelectorAll('.area-btn').forEach(function(b) { b.classList.remove('active'); });
              btn.classList.add('active');
              // Custom (non-default) areas → trigger live search
              if (DEFAULT_AREAS.indexOf(area) === -1) {
                if (window.doCitySearch) { window.doCitySearch(area); }
              } else {
                filterCards(area);
              }
            });
            // Insert before manage button
            monitorBar.insertBefore(btn, myAreasBtn);
          });

          // all btn state
          if (currentArea === 'all') allBtn.classList.add('active');
          else allBtn.classList.remove('active');
        }

        // Filter the apartment cards in #root
        function filterCards(area) {
          var cards = document.querySelectorAll('#root [data-apt-area]');
          if (!cards.length) {
            // Fallback: reload with area stored
            location.reload();
            return;
          }
          cards.forEach(function(card) {
            card.style.display = (area === 'all' || card.dataset.aptArea === area) ? '' : 'none';
          });
        }

        // Wire "All" button
        var allBtn = monitorBar.querySelector('[data-area="all"]');
        allBtn.addEventListener('click', function() {
          currentArea = 'all';
          localStorage.setItem('selectedArea', 'all');
          monitorBar.querySelectorAll('.area-btn').forEach(function(b) { b.classList.remove('active'); });
          allBtn.classList.add('active');
          filterCards('all');
        });

        buildFilterButtons();

        // Fetch counts
        function loadCounts() {
          fetch('/api/apartments?area=all').then(function(r){ return r.json(); }).then(function(apts) {
            var countMap = { all: apts.length };
            apts.forEach(function(a) {
              if (a.area) countMap[a.area] = (countMap[a.area] || 0) + 1;
            });
            monitorBar.querySelectorAll('.area-btn[data-area]').forEach(function(btn) {
              if (btn === myAreasBtn) return;
              var c = countMap[btn.dataset.area];
              if (c !== undefined) {
                var span = document.createElement('span');
                span.className = 'area-count';
                span.textContent = c;
                btn.appendChild(span);
              }
            });
          }).catch(function(){});
        }
        setTimeout(loadCounts, 1000);

        // ============ My Areas Modal ============
        var overlay = document.getElementById('my-areas-overlay');
        var panel   = document.getElementById('my-areas-panel');
        var tagList = document.getElementById('areas-tag-list');
        var newInput = document.getElementById('area-new-input');
        var addBtn  = document.getElementById('area-add-btn');
        var sugBox  = document.getElementById('area-suggestions');
        var saveBtn = document.getElementById('areas-save-btn');
        var cancelBtn = document.getElementById('areas-cancel-btn');
        var closeBtn = document.getElementById('close-my-areas');

        var draftAreas = [];

        function openModal() {
          draftAreas = getMyAreas().slice();
          renderTags();
          overlay.classList.add('active');
          newInput.value = '';
          sugBox.classList.remove('active');
          applyI18n();
        }
        function closeModal() { overlay.classList.remove('active'); }

        myAreasBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });

        function renderTags() {
          tagList.innerHTML = '';
          draftAreas.forEach(function(area) {
            var tag = document.createElement('span');
            tag.className = 'area-tag';
            tag.textContent = area;
            var rm = document.createElement('button');
            rm.className = 'area-tag-remove';
            rm.textContent = '×';
            rm.title = t('close');
            rm.addEventListener('click', function() {
              draftAreas = draftAreas.filter(function(a){ return a !== area; });
              renderTags();
            });
            tag.appendChild(rm);
            tagList.appendChild(tag);
          });
          if (draftAreas.length === 0) {
            var empty = document.createElement('span');
            empty.style.cssText = 'color:var(--text-muted);font-size:13px;';
            empty.setAttribute('data-i18n', 'myAreasEmpty');
            empty.textContent = t('myAreasEmpty');
            tagList.appendChild(empty);
          }
        }

        function addAreaFromInput() {
          var val = newInput.value.trim();
          if (!val) return;
          if (draftAreas.indexOf(val) !== -1) { newInput.value = ''; sugBox.classList.remove('active'); return; }
          draftAreas.push(val);
          renderTags();
          newInput.value = '';
          sugBox.classList.remove('active');
        }

        addBtn.addEventListener('click', addAreaFromInput);
        newInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') { e.preventDefault(); addAreaFromInput(); }
        });

        // Autocomplete suggestions
        newInput.addEventListener('input', function() {
          var q = newInput.value.trim().toLowerCase();
          sugBox.innerHTML = '';
          if (q.length < 2) { sugBox.classList.remove('active'); return; }
          var matches = CITIES_LIST.filter(function(c) {
            return c.toLowerCase().indexOf(q) !== -1 && draftAreas.indexOf(c) === -1;
          }).slice(0, 8);
          if (!matches.length) { sugBox.classList.remove('active'); return; }
          matches.forEach(function(city) {
            var item = document.createElement('div');
            item.className = 'area-sug-item';
            item.textContent = city;
            item.addEventListener('click', function() {
              if (draftAreas.indexOf(city) === -1) draftAreas.push(city);
              renderTags();
              newInput.value = '';
              sugBox.classList.remove('active');
            });
            sugBox.appendChild(item);
          });
          sugBox.classList.add('active');
        });

        document.addEventListener('click', function(e) {
          if (!panel.contains(e.target)) sugBox.classList.remove('active');
        });

        saveBtn.addEventListener('click', function() {
          var prevAreas = getMyAreas();
          if (draftAreas.length === 0) {
            localStorage.removeItem('myAreas');
          } else {
            saveMyAreas(draftAreas);
          }
          // If current selected area no longer exists, reset to all
          var saved = getMyAreas();
          if (currentArea !== 'all' && saved.indexOf(currentArea) === -1) {
            localStorage.setItem('selectedArea', 'all');
          }
          closeModal();
          buildFilterButtons();
          loadCounts();

          // Background search for newly added custom cities (to prime cache + hourly refresh)
          draftAreas.forEach(function(area) {
            if (DEFAULT_AREAS.indexOf(area) === -1 && prevAreas.indexOf(area) === -1) {
              fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ city: area })
              }).catch(function(){});
            }
          });

          var lbl = saveBtn.textContent;
          saveBtn.textContent = t('saved');
          setTimeout(function() { saveBtn.textContent = lbl; }, 1200);
        });

      })();
    </script>

    <!-- ==================== Login System ==================== -->
    <script>
      (function() {
        var btn = document.getElementById('login-btn');
        var panel = document.getElementById('login-panel');
        var overlay = document.getElementById('login-overlay');
        var input = document.getElementById('login-email');
        var submitBtn = document.getElementById('login-submit');
        var logoutBtn = document.getElementById('logout-btn');
        var status = document.getElementById('login-status');
        var savedEmail = localStorage.getItem('userEmail') || '';
        if (input) input.value = savedEmail;

        function updateLoginBtn() {
          var email = localStorage.getItem('userEmail');
          if (email) {
            btn.textContent = '\ud83d\udc64 ' + email.split('@')[0];
            btn.style.background = '#065f46';
            btn.style.borderColor = '#059669';
            logoutBtn.style.display = 'block';
            submitBtn.textContent = '\ud83d\udd04 ' + t('restore');
          } else {
            btn.textContent = t('login');
            btn.style.background = '#1e3a5f';
            btn.style.borderColor = '#3b82f6';
            logoutBtn.style.display = 'none';
            submitBtn.textContent = t('loginBtn');
          }
        }
        updateLoginBtn();

        function openPanel() {
          panel.classList.add('active');
          overlay.classList.add('active');
          status.classList.remove('active');
        }
        function closePanel() {
          panel.classList.remove('active');
          overlay.classList.remove('active');
        }
        btn.addEventListener('click', openPanel);
        overlay.addEventListener('click', closePanel);

        submitBtn.addEventListener('click', function() {
          var email = input.value.trim();
          if (!email || !email.includes('@')) {
            status.textContent = '\u274c ' + t('invalidEmail');
            status.style.color = '#ef4444';
            status.classList.add('active');
            return;
          }
          submitBtn.disabled = true;
          submitBtn.textContent = '\u23f3 ' + t('loading');
          fetch('/api/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
          }).then(function(r){return r.json();}).then(function(data) {
            if (data.success) {
              localStorage.setItem('userEmail', email);
              status.textContent = data.restored
                ? '\u2705 ' + t('restored') + ': ' + data.favorites + ' + ' + data.contacted
                : '\u2705 ' + t('loggedIn');
              status.style.color = '#22c55e';
              status.classList.add('active');
              updateLoginBtn();
              setTimeout(function() { closePanel(); location.reload(); }, 1500);
            } else {
              status.textContent = data.error || '\u274c';
              status.style.color = '#ef4444';
              status.classList.add('active');
            }
          }).catch(function() {
            status.textContent = '\u274c';
            status.style.color = '#ef4444';
            status.classList.add('active');
          }).finally(function() {
            submitBtn.disabled = false;
            updateLoginBtn();
          });
        });

        logoutBtn.addEventListener('click', function() {
          localStorage.removeItem('userEmail');
          input.value = '';
          updateLoginBtn();
          status.textContent = '\ud83d\udc4b ' + t('loggedOut');
          status.style.color = '#94a3b8';
          status.classList.add('active');
          setTimeout(closePanel, 1200);
        });
      })();
    </script>

    <!-- ==================== Deleted Apartments Panel ==================== -->
    <script>
      (function() {
        var btn = document.getElementById('deleted-btn');
        var panel = document.getElementById('deleted-panel');
        var overlay = document.getElementById('deleted-overlay');
        var closeBtn = document.getElementById('close-deleted');
        var listEl = document.getElementById('deleted-list');
        var emptyEl = document.getElementById('deleted-empty');
        var countEl = document.getElementById('deleted-count');

        function escH(str) {
          if (!str) return '';
          var d = document.createElement('div'); d.textContent = str; return d.innerHTML;
        }
        function formatDate(d) {
          if (!d) return '';
          try {
            return new Date(d.replace(' ','T')+'Z').toLocaleDateString(getLang() === 'ar' ? 'ar-EG' : 'de-DE', {
              day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
            });
          } catch(e) { return d; }
        }

        function loadDeleted() {
          fetch('/api/apartments/deleted').then(function(r){return r.json();}).then(function(apts) {
            countEl.textContent = apts.length;
            listEl.innerHTML = '';
            if (apts.length === 0) { emptyEl.style.display = 'block'; return; }
            emptyEl.style.display = 'none';
            apts.forEach(function(apt) {
              var reason = apt.deletedBy === 'user' ? t('byUser') : t('byPlatform');
              var reasonColor = apt.deletedBy === 'user' ? '#f59e0b' : '#ef4444';
              var card = document.createElement('div');
              card.className = 'deleted-card';
              card.innerHTML =
                (apt.imageUrl ? '<img src="'+escH(apt.imageUrl)+'" onerror="this.style.display=\'none\'">' : '') +
                '<div class="deleted-card-info">' +
                  '<div class="deleted-card-title">'+escH(apt.title)+'</div>' +
                  '<div class="deleted-card-meta">\ud83d\udcb0 '+(apt.price||0)+'\u20ac'+(apt.priceType?' '+apt.priceType:'') +
                    ' | \ud83d\udccd '+escH(apt.address||apt.area)+' | \ud83d\udccc '+escH(apt.source)+'</div>' +
                  '<div style="display:flex;gap:8px;align-items:center;margin-top:6px;">' +
                    '<span style="color:'+reasonColor+';font-size:12px;font-weight:600;">'+reason+'</span>' +
                    '<span style="color:var(--text-muted);font-size:11px;">'+formatDate(apt.deletedAt)+'</span>' +
                  '</div>' +
                '</div>' +
                '<div class="deleted-card-actions">' +
                  '<button onclick="restoreApt('+apt.id+')" style="color:#22c55e;border-color:#22c55e;">'+t('restore')+'</button>' +
                  '<button onclick="permDeleteApt('+apt.id+')" style="color:#ef4444;border-color:#ef4444;">'+t('permDelete')+'</button>' +
                  (apt.url ? '<a href="'+escH(apt.url)+'" target="_blank" style="color:#3b82f6;border-color:#3b82f6;">\ud83d\udd17 '+t('view')+'</a>' : '') +
                '</div>';
              listEl.appendChild(card);
            });
          }).catch(function(e) { console.error(e); });
        }

        window.restoreApt = function(id) {
          fetch('/api/apartments/'+id+'/restore', { method: 'POST' }).then(function() { loadDeleted(); });
        };
        window.permDeleteApt = function(id) {
          if (!confirm(t('confirmPermDelete'))) return;
          fetch('/api/apartments/'+id+'/permanent', { method: 'DELETE' }).then(function() { loadDeleted(); });
        };

        btn.addEventListener('click', function() {
          panel.classList.add('active');
          overlay.classList.add('active');
          loadDeleted();
        });
        closeBtn.addEventListener('click', function() { panel.classList.remove('active'); overlay.classList.remove('active'); });
        overlay.addEventListener('click', function() { panel.classList.remove('active'); overlay.classList.remove('active'); });

        // Load count on page load
        setTimeout(function() {
          fetch('/api/apartments/deleted').then(function(r){return r.json();}).then(function(apts) {
            countEl.textContent = apts.length;
          }).catch(function(){});
        }, 2000);
      })();
    </script>

    <script>
      (function() {

        var searchResultsCache = [];

            '</div>' : '') +
            '<div class="adm-meta-row">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;margin-top:1px;color:var(--text-muted)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>' +
              '<span>'+escH(apt.area||'')+'</span>' +
            '</div>' +
          '</div>';

          // --- Assemble modal ---
          modal.innerHTML = galleryHtml +
            '<div class="adm-layout">' +
              '<div class="adm-main">' +
                '<div class="adm-type-label">'+escH(typeLabel)+'</div>' +
                '<h2 class="adm-title">'+escH(apt.title)+'</h2>' +
                priceHtml +
                detailsHtml +
                addrHtml +
                merkHtml +
                kostenHtml +
                notesHtml +
              '</div>' +
              sidebarHtml +
            '</div>';

          overlay.classList.add('active');
          modal.classList.add('active');
          modal.scrollTop = 0;
        }

        window.closeAptDetail = function() {
          overlay.classList.remove('active');
          modal.classList.remove('active');
          modal.innerHTML = '';
          window._admImages = [];
        };

        window.admGallery = function(dir, absolute) {
          var imgs = window._admImages || [];
          if (imgs.length <= 1) return;
          var gallery = document.getElementById('adm-gallery');
          var idx;
          if (absolute) {
            idx = dir;
          } else {
            idx = parseInt(gallery.dataset.idx || '0') + dir;
            if (idx < 0) idx = imgs.length - 1;
            if (idx >= imgs.length) idx = 0;
          }
          gallery.dataset.idx = idx;
          // Fade transition
          var imgEl = document.getElementById('adm-gallery-img');
          imgEl.classList.add('fading');
          setTimeout(function() {
            imgEl.src = imgs[idx];
            imgEl.classList.remove('fading');
          }, 80);
          // Counter
          var counter = document.getElementById('adm-img-idx');
          if (counter) counter.textContent = idx + 1;
          // Thumbnail active state
          var thumbs = document.querySelectorAll('#adm-thumbs .adm-thumb');
          thumbs.forEach(function(t, i) { t.classList.toggle('active', i === idx); });
          // Scroll active thumb into view
          if (thumbs[idx]) thumbs[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
        };

        window.openLightbox = function() {
          var imgs = window._admImages || [];
          if (!imgs.length) return;
          var gallery = document.getElementById('adm-gallery');
          var idx = parseInt(gallery ? gallery.dataset.idx : '0');
          var lb = document.getElementById('img-lightbox');
          document.getElementById('lb-img').src = imgs[idx];
          document.getElementById('lb-idx').textContent = idx + 1;
          document.getElementById('lb-total').textContent = imgs.length;
          lb.dataset.idx = idx;
          lb.classList.add('active');
        };
        window.closeLightbox = function() {
          document.getElementById('img-lightbox').classList.remove('active');
        };
        window.lbNav = function(dir) {
          var imgs = window._admImages || [];
          if (imgs.length <= 1) return;
          var lb = document.getElementById('img-lightbox');
          var idx = parseInt(lb.dataset.idx || '0') + dir;
          if (idx < 0) idx = imgs.length - 1;
          if (idx >= imgs.length) idx = 0;
          lb.dataset.idx = idx;
          document.getElementById('lb-img').src = imgs[idx];
          document.getElementById('lb-idx').textContent = idx + 1;
          var gallery = document.getElementById('adm-gallery');
          if (gallery) {
            gallery.dataset.idx = idx;
            document.getElementById('adm-gallery-img').src = imgs[idx];
            var counter = document.getElementById('adm-img-idx');
            if (counter) counter.textContent = idx + 1;
            // Sync thumbnails
            var thumbs = document.querySelectorAll('#adm-thumbs .adm-thumb');
            thumbs.forEach(function(t, i) { t.classList.toggle('active', i === idx); });
            if (thumbs[idx]) thumbs[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
          }
        };
        document.getElementById('img-lightbox').addEventListener('click', function(e) {
          if (e.target === this) window.closeLightbox();
        });
        overlay.addEventListener('click', window.closeAptDetail);
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') window.closeAptDetail(); });

        // Cache apartments from API for detail modal
        function loadAptCache() {
          fetch('/api/apartments').then(function(r){return r.json();}).then(function(data) { aptCache = data; }).catch(function(){});
        }
        loadAptCache();
        setInterval(loadAptCache, 30000);

        // Attach click to React cards
        function addCardClick() {
          document.querySelectorAll('[data-testid^="card-apartment-"]').forEach(function(card) {
            if (card.dataset.cardClickBound) return;
            card.dataset.cardClickBound = '1';
            card.addEventListener('click', function(e) {
              if (e.target.closest('button, a, input, select, textarea')) return;
              var testId = card.getAttribute('data-testid');
              var id = testId ? parseInt(testId.replace('card-apartment-', '')) : null;
              if (!id) return;
              var apt = aptCache.find(function(a) { return a.id === id; });
              if (apt) openDetail(apt);
            });
          });
        }
        var observer = new MutationObserver(function() { setTimeout(addCardClick, 150); });
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root) observer.observe(root, { childList: true, subtree: true });
          addCardClick();
        }, 2000);

        // Expose openDetail for search results cards
        window.openAptDetail = openDetail;
      })();
    </script>

    <!-- ==================== City Search & Results ==================== -->
    <script>
      (function() {
        var GERMAN_CITIES = [
          "Berlin","Hamburg","M\u00fcnchen","K\u00f6ln","Frankfurt am Main","Stuttgart",
          "D\u00fcsseldorf","Leipzig","Dortmund","Essen","Bremen","Dresden",
          "Hannover","N\u00fcrnberg","Duisburg","Bochum","Wuppertal","Bielefeld",
          "Bonn","M\u00fcnster","Mannheim","Karlsruhe","Augsburg","Wiesbaden",
          "M\u00f6nchengladbach","Gelsenkirchen","Aachen","Braunschweig","Kiel",
          "Chemnitz","Halle","Magdeburg","Freiburg","Krefeld","Mainz",
          "L\u00fcbeck","Erfurt","Oberhausen","Rostock","Kassel","Hagen",
          "Potsdam","Saarbr\u00fccken","Hamm","Ludwigshafen","Oldenburg",
          "Osnabr\u00fcck","Leverkusen","Heidelberg","Darmstadt","Solingen",
          "Regensburg","Herne","Paderborn","Neuss","Ingolstadt",
          "Offenbach","W\u00fcrzburg","F\u00fcrth","Ulm","Heilbronn","Pforzheim",
          "Wolfsburg","G\u00f6ttingen","Bottrop","Reutlingen","Koblenz",
          "Bremerhaven","Remscheid","Bergisch Gladbach","Trier","Jena",
          "Erlangen","Moers","Siegen","Hildesheim","Salzgitter",
          "Cottbus","Kaiserslautern","Schwerin","G\u00fctersloh","Witten",
          "Gera","Iserlohn","D\u00fcren","Esslingen","Ludwigsburg",
          "T\u00fcbingen","Konstanz","Marburg","Gie\u00dfen","Hanau",
          "Buxtehude","Stade","Neu Wulmstorf","Neukloster","Harburg",
          "L\u00fcneburg","Cuxhaven","Celle","Uelzen","Rotenburg",
          "Bamberg","Bayreuth","Passau","Landshut","Rosenheim",
          "Friedrichshafen","Ravensburg","G\u00f6ppingen","Aalen","Heidenheim"
        ];
        var MONITORED = ['Buxtehude', 'Neukloster', 'Neu Wulmstorf'];

        var cityInput = document.getElementById('city-input');
        var searchBtn = document.getElementById('city-search-btn');
        var dropdown = document.getElementById('city-dropdown');
        var searchResults = document.getElementById('search-results');
        var searchLoading = document.getElementById('search-loading');
        var monitorBar = document.getElementById('monitor-bar');
        var rootEl = document.getElementById('root');
        var searchBack = document.getElementById('search-back');
        var searchTitle = document.getElementById('search-title');
        var searchCount = document.getElementById('search-count');
        var searchCards = document.getElementById('search-cards');
        var searchSourceFilter = document.getElementById('search-source-filter');

        var currentSearchData = [];
        var activeSourceFilter = 'all';

        var sourceColors = {
          'Kleinanzeigen': { bg: '#0d948822', color: '#2dd4bf', border: '#0d948833' },
          'Immowelt': { bg: '#7c3aed22', color: '#a78bfa', border: '#7c3aed33' },
          'markt.de': { bg: '#e1195822', color: '#fb7185', border: '#e1195833' },
          'Wohnungsb\u00f6rse': { bg: '#4f46e522', color: '#818cf8', border: '#4f46e533' },
        };

        function escH(str) {
          if (!str) return '';
          var d = document.createElement('div'); d.textContent = str; return d.innerHTML;
        }

        // City autocomplete dropdown
        cityInput.addEventListener('input', function() {
          var val = cityInput.value.trim().toLowerCase();
          if (val.length < 1) { dropdown.classList.remove('active'); return; }
          var matches = GERMAN_CITIES.filter(function(c) {
            return c.toLowerCase().includes(val);
          }).slice(0, 12);
          if (matches.length === 0) { dropdown.classList.remove('active'); return; }
          dropdown.innerHTML = matches.map(function(city) {
            var isMonitored = MONITORED.includes(city);
            return '<div class="city-dropdown-item" data-city="'+escH(city)+'">'+escH(city)+
              (isMonitored ? '<span class="monitored-badge">\ud83d\udce1 Monitor</span>' : '') +
              '</div>';
          }).join('');
          dropdown.classList.add('active');
        });

        dropdown.addEventListener('click', function(e) {
          var item = e.target.closest('.city-dropdown-item');
          if (!item) return;
          var city = item.dataset.city;
          cityInput.value = city;
          dropdown.classList.remove('active');
          triggerSearch(city);
        });

        cityInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            dropdown.classList.remove('active');
            var val = cityInput.value.trim();
            if (val.length >= 2) triggerSearch(val);
          }
        });

        searchBtn.addEventListener('click', function() {
          dropdown.classList.remove('active');
          var val = cityInput.value.trim();
          if (val.length >= 2) triggerSearch(val);
        });

        document.addEventListener('click', function(e) {
          if (!e.target.closest('.city-search-wrapper')) {
            dropdown.classList.remove('active');
          }
        });

        function triggerSearch(cityName) {
          // If monitored city, switch to monitor view
          if (MONITORED.includes(cityName)) {
            localStorage.setItem('selectedArea', cityName);
            location.reload();
            return;
          }
          doLiveSearch(cityName);
        }

        // Expose globally so area filter can trigger search for custom areas
        window.doCitySearch = triggerSearch;

        function doLiveSearch(cityName) {
          // Show loading
          searchLoading.classList.add('active');
          searchBtn.disabled = true;

          fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ city: cityName })
          })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            searchLoading.classList.remove('active');
            searchBtn.disabled = false;
            if (data.error) {
              alert(data.error);
              return;
            }
            currentSearchData = data.apartments || [];
            showSearchResults(cityName, !!data.fromCache);
          })
          .catch(function(err) {
            searchLoading.classList.remove('active');
            searchBtn.disabled = false;
            alert('Search failed: ' + err.message);
          });
        }

        function showSearchResults(cityName, fromCache) {
          // Hide monitor view, show search results
          monitorBar.style.display = 'none';
          rootEl.style.display = 'none';
          searchResults.classList.add('active');

          searchTitle.textContent = cityName + ' \u2014 ' + currentSearchData.length + ' ' + t('listings');
          searchCount.innerHTML = t('results') + (fromCache ? ' <span style="font-size:11px;background:var(--badge-bg,#0d948822);color:var(--badge-color,#2dd4bf);border:1px solid var(--badge-border,#0d948833);padding:2px 7px;border-radius:20px;font-weight:600;vertical-align:middle;">⚡ cached</span>' : '');
          activeSourceFilter = 'all';

          renderSourceFilter();
          renderCards();
        }

        function renderSourceFilter() {
          var sources = {};
          currentSearchData.forEach(function(apt) {
            sources[apt.source] = (sources[apt.source] || 0) + 1;
          });

          var html = '<button class="search-source-btn'+(activeSourceFilter==='all'?' active':'')+'" data-source="all">'+t('all')+' ('+currentSearchData.length+')</button>';
          Object.keys(sources).forEach(function(src) {
            html += '<button class="search-source-btn'+(activeSourceFilter===src?' active':'')+'" data-source="'+escH(src)+'">'+escH(src)+' ('+sources[src]+')</button>';
          });
          searchSourceFilter.innerHTML = html;

          searchSourceFilter.querySelectorAll('.search-source-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
              activeSourceFilter = btn.dataset.source;
              renderSourceFilter();
              renderCards();
            });
          });
        }

        function renderCards() {
          var filtered = activeSourceFilter === 'all'
            ? currentSearchData
            : currentSearchData.filter(function(a) { return a.source === activeSourceFilter; });

          if (filtered.length === 0) {
            searchCards.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:18px;">\ud83c\udfe0 '+t('noResults')+'</div>';
            return;
          }

          searchCards.innerHTML = filtered.map(function(apt, idx) {
            var sc = sourceColors[apt.source] || { bg: 'rgba(99,102,241,0.12)', color: '#6366f1', border: 'rgba(99,102,241,0.3)' };
            var images = [];
            try { images = JSON.parse(apt.imageUrls || '[]'); } catch(e) {}
            if (!images.length && apt.imageUrl) images = [apt.imageUrl];

            // Image / media section
            var mediaHtml;
            if (images.length > 0) {
              var counterHtml = images.length > 1
                ? '<span class="s-card-counter">\ud83d\uddbc\ufe0f 1\u2009/\u2009'+images.length+'</span>'
                : '';
              mediaHtml = '<div class="s-card-media">' +
                '<img src="'+escH(images[0])+'" onerror="this.style.display=\'none\'" loading="lazy">' +
                '<span class="s-card-source-badge" style="background:'+sc.bg+';color:'+sc.color+';border:1px solid '+sc.border+';">'+escH(apt.source)+'</span>' +
                '<span class="s-card-fav" title="Merken" onclick="event.stopPropagation()">\u2665</span>' +
                counterHtml +
              '</div>';
            } else {
              mediaHtml = '<div class="s-card-media">' +
                '<div class="s-card-no-img">\ud83c\udfe0</div>' +
                '<span class="s-card-source-badge" style="background:'+sc.bg+';color:'+sc.color+';border:1px solid '+sc.border+';">'+escH(apt.source)+'</span>' +
              '</div>';
            }

            // Price row
            var priceLabel = apt.priceType || 'Kaltmiete';
            var priceHtml = '<div class="s-card-price-row">' +
              '<span class="s-card-price">'+(apt.price ? apt.price+'\u2009\u20ac' : '\u2014')+'</span>' +
              '<span class="s-card-price-type">'+escH(priceLabel)+'</span>' +
            '</div>';

            // Details: rooms · size
            var detailParts = [];
            if (apt.rooms) detailParts.push(apt.rooms+' Zimmer');
            if (apt.size)  detailParts.push(apt.size+'\u2009m\u00b2');
            var detailsHtml = detailParts.length
              ? '<div class="s-card-details">'+detailParts.join('<span class="s-card-details-sep"> \u00b7 </span>')+'</div>'
              : '';

            // Location
            var locHtml = '<div class="s-card-location">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;opacity:.8"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>' +
              escH(apt.address || apt.area || '') +
            '</div>';

            // Feature tags
            var feats = [];
            if (apt.noCommission) feats.push(t('noCommission'));
            if (apt.furnished)    feats.push(t('furnished'));
            if (apt.hasBalcony)   feats.push(t('hasBalcony'));
            if (apt.hasGarden)    feats.push(t('hasGarden'));
            if (apt.hasParking)   feats.push(t('hasParking'));
            var featsHtml = feats.length
              ? '<div class="s-card-features">'+feats.map(function(f){return '<span class="s-card-feat">\u2714\ufe0e '+f+'</span>';}).join('')+'</div>'
              : '';

            return '<div class="s-card" data-search-idx="'+idx+'">' +
              mediaHtml +
              '<div class="s-card-body">' +
                priceHtml +
                '<div class="s-card-title">'+escH(apt.title)+'</div>' +
                detailsHtml +
                locHtml +
                featsHtml +
              '</div>' +
            '</div>';
          }).join('');

          // Attach click handlers
          searchCards.querySelectorAll('.s-card').forEach(function(card) {
            card.addEventListener('click', function(e) {
              if (e.target.closest('a')) return;
              var idx = parseInt(card.dataset.searchIdx);
              var filtered2 = activeSourceFilter === 'all'
                ? currentSearchData
                : currentSearchData.filter(function(a) { return a.source === activeSourceFilter; });
              var apt = filtered2[idx];
              if (apt && window.openAptDetail) window.openAptDetail(apt);
            });
          });
        }

        // Back button
        searchBack.addEventListener('click', function() {
          searchResults.classList.remove('active');
          monitorBar.style.display = '';
          rootEl.style.display = '';
          cityInput.value = '';
          currentSearchData = [];
        });
      })();
    </script>

    <!-- ==================== Page-load Update Notifier ==================== -->
    <script>
      (function() {
        var banner = document.getElementById('update-banner');
        var itemsEl = document.getElementById('update-banner-items');
        var closeBtn = document.getElementById('update-banner-close');

        if (closeBtn) closeBtn.addEventListener('click', function() {
          banner.classList.remove('active', 'no-update');
        });

        function getMyAreas() {
          try {
            var s = localStorage.getItem('myAreas');
            if (s) { var a = JSON.parse(s); if (Array.isArray(a) && a.length > 0) return a; }
          } catch(e) {}
          return ['Buxtehude', 'Neukloster', 'Neu Wulmstorf'];
        }
        var DEFAULT_AREAS = ['Buxtehude', 'Neukloster', 'Neu Wulmstorf'];

        // Only check cities that the user added themselves (non-default)
        var customCities = getMyAreas().filter(function(a) {
          return DEFAULT_AREAS.indexOf(a) === -1;
        });
        if (customCities.length === 0) return; // Nothing to notify about

        // Fetch cache counts (quick, no scraping)
        setTimeout(function() {
          fetch('/api/search-cache-info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cities: customCities })
          }).then(function(r) { return r.json(); }).then(function(counts) {
            var updates = [];
            var LAST_KEY_PREFIX = 'cityLastCount_';
            Object.keys(counts).forEach(function(city) {
              var current = counts[city];
              if (current === null) return; // No cache yet
              var last = parseInt(localStorage.getItem(LAST_KEY_PREFIX + city) || '-1', 10);
              var diff = (last === -1) ? 0 : (current - last);
              updates.push({ city: city, current: current, diff: diff, fresh: last === -1 });
              // Update stored count
              localStorage.setItem(LAST_KEY_PREFIX + city, current);
            });

            if (updates.length === 0) return;

            var newUpdates = updates.filter(function(u) { return u.diff > 0; });
            var chips = '';

            if (newUpdates.length > 0) {
              banner.classList.remove('no-update');
              newUpdates.forEach(function(u) {
                chips += '<span class="update-banner-chip" data-city="' + escapeHtml(u.city) + '">'
                  + '🏠 ' + escapeHtml(u.city) + ': <strong>+' + u.diff + ' neu</strong>'
                  + '</span>';
              });
              itemsEl.innerHTML = '<span style="margin-right:8px;">🔔</span>' + chips;
            } else {
              // All cities, no new results
              banner.classList.add('no-update');
              var names = updates.map(function(u) { return u.city + ' (' + u.current + ')'; }).join(', ');
              itemsEl.innerHTML = '✓ Keine neuen Wohnungen — ' + names;
              // Auto-dismiss after 4 seconds
              setTimeout(function() { banner.classList.remove('active', 'no-update'); }, 4000);
            }

            banner.classList.add('active');

            // Clicking a chip triggers live search for that city
            itemsEl.querySelectorAll('.update-banner-chip').forEach(function(chip) {
              chip.addEventListener('click', function() {
                var city = chip.dataset.city;
                if (window.doCitySearch) window.doCitySearch(city);
                banner.classList.remove('active', 'no-update');
              });
            });
          }).catch(function() {});
        }, 2000); // 2 second delay after page load

        function escapeHtml(s) {
          var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
        }
      })();
    </script>
  </body>
</html>
