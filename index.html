    <script>
      // Area filter: intercept fetch to add ?area= parameter
      (function() {
        const currentArea = localStorage.getItem('selectedArea') || 'all';
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
          if (typeof url === 'string' && url.includes('/api/apartments') && !url.includes('?area=') && !url.includes('&area=')) {
            const separator = url.includes('?') ? '&' : '?';
            url = url + separator + 'area=' + encodeURIComponent(currentArea);
          }
          return originalFetch.call(this, url, options);
        };
      })();
    </script>

        function playSound() {

            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            // Play a pleasant notification chime

        function checkNew() {

    <script>
      // Area filter bar logic
      (function() {
        const currentArea = localStorage.getItem('selectedArea') || 'all';
        const buttons = document.querySelectorAll('#area-filter-bar .area-btn');
        buttons.forEach(btn => {
          if (btn.dataset.area === currentArea) btn.classList.add('active');
          btn.addEventListener('click', () => {
            const area = btn.dataset.area;
            localStorage.setItem('selectedArea', area);
            location.reload();
          });
        });

        // Fetch counts for each area and display
        async function loadCounts() {
          try {
            const res = await fetch('/api/apartments?area=all');
            const apts = await res.json();
            const counts = { all: apts.length, Buxtehude: 0, Neukloster: 0, 'Neu Wulmstorf': 0 };
            apts.forEach(a => { if (counts[a.area] !== undefined) counts[a.area]++; });
            buttons.forEach(btn => {
              const c = counts[btn.dataset.area];
              if (c !== undefined) {
                const span = document.createElement('span');
                span.className = 'area-count';
                span.textContent = c;
                btn.appendChild(span);
              }
            });
          } catch(e) {}
        }
        setTimeout(loadCounts, 1000);
      })();
    </script>
    <script>
      // Mark all as seen: button + auto after 30 seconds
      (function() {
        function markAllSeen() {
          fetch('/api/mark-all-seen', { method: 'POST' })
            .then(() => {
              const btn = document.getElementById('mark-seen-btn');
              if (btn) { btn.textContent = '✅ تم'; btn.style.background = '#166534'; }
              // Remove red glow without reloading - just remove the CSS classes
              document.querySelectorAll('[class*="ring-red"], [class*="border-red"], [class*="shadow-red"], [class*="animate-pulse"]').forEach(el => {
                el.className = el.className.replace(/\bring-2\b/g, '').replace(/\bring-red-500\b/g, '').replace(/\bborder-red-500\b/g, '').replace(/\bshadow-red-500\/20\b/g, '').replace(/\banimate-pulse\b/g, '');
                el.style.animation = 'none';
                el.style.boxShadow = 'none';
              });
              // Also remove any pulse-red animations
              document.querySelectorAll('[style*="pulse-red"]').forEach(el => {
                el.style.animation = 'none';
              });
            })
            .catch(() => {});
        }
        
        // Button click
        const btn = document.getElementById('mark-seen-btn');
        if (btn) btn.addEventListener('click', markAllSeen);
        
        // Auto mark after 30 seconds of viewing
        setTimeout(markAllSeen, 30000);
      })();
    </script>
    <script>
      // Telegram settings panel logic
      (function() {
        const settingsBtn = document.getElementById('settings-btn');
        const panel = document.getElementById('settings-panel');
        const overlay = document.getElementById('settings-overlay');
        const saveBtn = document.getElementById('save-tg-settings');
        const status = document.getElementById('tg-status');
        const boxes = {
          Buxtehude: document.getElementById('tg-buxtehude'),
          Neukloster: document.getElementById('tg-neukloster'),
          'Neu Wulmstorf': document.getElementById('tg-neuwulmstorf')
        };

        function openPanel() {
          panel.style.display = 'block';
          overlay.style.display = 'block';
          status.style.display = 'none';
          // Load current settings
          fetch('/api/settings/telegram-areas').then(r => r.json()).then(data => {
            Object.keys(boxes).forEach(k => {
              boxes[k].checked = data.areas.includes(k);
            });
          }).catch(() => {});
        }
        function closePanel() {
          panel.style.display = 'none';
          overlay.style.display = 'none';
        }

        settingsBtn.addEventListener('click', openPanel);
        overlay.addEventListener('click', closePanel);

        saveBtn.addEventListener('click', () => {
          const selected = Object.keys(boxes).filter(k => boxes[k].checked);
          fetch('/api/settings/telegram-areas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ areas: selected })
          }).then(r => r.json()).then(data => {
            status.textContent = '✅ تم الحفظ! الإشعارات: ' + (data.areas.length ? data.areas.join(', ') : 'مغلقة');
            status.style.display = 'block';
            setTimeout(closePanel, 1500);
          }).catch(() => {
            status.textContent = '❌ فشل الحفظ';
            status.style.display = 'block';
            status.style.color = '#ef4444';
          });
        });
      })();
    </script>

                <div style="flex:1;min-width:0;">
                  <div style="color:#f8fafc;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${apt.title}</div>
                  <div style="color:#94a3b8;font-size:12px;margin-top:2px;">💰 ${apt.price || 0}€ | 📍 ${apt.address || apt.area} | 📌 ${apt.source}</div>
                  <div style="display:flex;gap:8px;align-items:center;margin-top:6px;">
                    <span style="color:${reasonColor};font-size:12px;font-weight:600;">${reason}</span>
                    <span style="color:#64748b;font-size:11px;">${formatDate(apt.deletedAt)}</span>
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
                  <button onclick="restoreApt(${apt.id})" style="padding:4px 10px;border-radius:6px;border:1px solid #22c55e;background:transparent;color:#22c55e;cursor:pointer;font-size:12px;font-family:'Tajawal';">↩️ استرجاع</button>
                  <button onclick="permDeleteApt(${apt.id})" style="padding:4px 10px;border-radius:6px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer;font-size:12px;font-family:'Tajawal';">❌ حذف نهائي</button>
                  ${apt.url ? `<a href="${apt.url}" target="_blank" style="padding:4px 10px;border-radius:6px;border:1px solid #3b82f6;color:#3b82f6;text-decoration:none;font-size:12px;text-align:center;font-family:'Tajawal';">🔗 عرض</a>` : ''}
                </div>
              `;
              listEl.appendChild(card);
            });
          } catch(e) { console.error(e); }
        }

        window.restoreApt = async function(id) {
          await fetch(`/api/apartments/${id}/restore`, { method: 'POST' });
          loadDeleted();
        };
        window.permDeleteApt = async function(id) {
          if (!confirm('حذف نهائي - لا يمكن التراجع؟')) return;
          await fetch(`/api/apartments/${id}/permanent`, { method: 'DELETE' });
          loadDeleted();
        };

        btn.addEventListener('click', () => {
          panel.style.display = 'block';
          overlay.style.display = 'block';
          loadDeleted();
        });
        closeBtn.addEventListener('click', () => { panel.style.display = 'none'; overlay.style.display = 'none'; });
        overlay.addEventListener('click', () => { panel.style.display = 'none'; overlay.style.display = 'none'; });

        // Load count on page load
        setTimeout(async () => {
          try {
            const res = await fetch('/api/apartments/deleted');
            const apts = await res.json();
            countEl.textContent = apts.length;
          } catch(e) {}
        }, 2000);
      })();
    </script>
    <script>
      // Apartment detail modal - click card to show popup with all info
      (function() {
        const overlay = document.getElementById('apt-detail-overlay');
        const modal = document.getElementById('apt-detail-modal');
        let aptCache = [];

        const sourceColors = {
          Kleinanzeigen: 'background:#0d948822;color:#2dd4bf;border-color:#0d948833',
          Immowelt: 'background:#7c3aed22;color:#a78bfa;border-color:#7c3aed33',
          ImmoScout24: 'background:#ea580c22;color:#fb923c;border-color:#ea580c33',
          'markt.de': 'background:#e1195822;color:#fb7185;border-color:#e1195833',
          'Wohnungsb\u00f6rse': 'background:#4f46e522;color:#818cf8;border-color:#4f46e533',
        };

        function escapeHtml(str) {
          if (!str) return '';
          const d = document.createElement('div');
          d.textContent = str;
          return d.innerHTML;
        }

        function formatDate(d) {
          if (!d) return '';
          try {
            const dt = d.length === 10
              ? new Date(d.split('-')[0], d.split('-')[1]-1, d.split('-')[2])
              : new Date(d.replace(' ','T')+'Z');
            const months = ['\u064a\u0646\u0627\u064a\u0631','\u0641\u0628\u0631\u0627\u064a\u0631','\u0645\u0627\u0631\u0633','\u0623\u0628\u0631\u064a\u0644','\u0645\u0627\u064a\u0648','\u064a\u0648\u0646\u064a\u0648','\u064a\u0648\u0644\u064a\u0648','\u0623\u063a\u0633\u0637\u0633','\u0633\u0628\u062a\u0645\u0628\u0631','\u0623\u0643\u062a\u0648\u0628\u0631','\u0646\u0648\u0641\u0645\u0628\u0631','\u062f\u064a\u0633\u0645\u0628\u0631'];
            return dt.getDate() + ' ' + months[dt.getMonth()];
          } catch(e) { return d; }
        }

        function openDetail(apt) {
          const sc = sourceColors[apt.source] || 'background:#1e293b;color:#94a3b8;border-color:#334155';
          const features = [
            { key: 'noCommission', label: '\u0628\u062f\u0648\u0646 \u0639\u0645\u0648\u0644\u0629', icon: '\u2714\ufe0f' },
            { key: 'furnished', label: '\u0645\u0641\u0631\u0648\u0634\u0629', icon: '\u{1f6cb}\ufe0f' },
            { key: 'hasBalcony', label: '\u0628\u0644\u0643\u0648\u0646', icon: '\u{1f334}' },
            { key: 'hasGarden', label: '\u062d\u062f\u064a\u0642\u0629', icon: '\u{1f333}' },
            { key: 'hasParking', label: '\u0645\u0648\u0642\u0641 \u0633\u064a\u0627\u0631\u0629', icon: '\u{1f697}' },
          ];

          const imgHtml = apt.imageUrl
            ? `<img class="adm-img" src="${escapeHtml(apt.imageUrl)}" onerror="this.outerHTML='<div class=adm-no-img>\u{1f3e0}</div>'">`
            : '<div class="adm-no-img">\u{1f3e0}</div>';

          const featHtml = features.map(f =>
            `<span class="adm-feat ${apt[f.key] ? 'adm-feat-yes' : 'adm-feat-no'}">${f.icon} ${f.label}</span>`
          ).join('');

          const notesHtml = apt.notes
            ? `<div class="adm-notes">${escapeHtml(apt.notes)}</div>`
            : '';

          modal.innerHTML = `
            <div style="position:relative;">
              ${imgHtml}
              <button class="adm-close" onclick="closeAptDetail()">\u2715</button>
            </div>
            <div class="adm-body">
              <span class="adm-source" style="${sc}">${escapeHtml(apt.source)}</span>
              <h2 class="adm-title">${escapeHtml(apt.title)}</h2>
              <div class="adm-address">\u{1f4cd} ${escapeHtml(apt.address || apt.area)}</div>
              <div class="adm-stats">
                <div class="adm-stat">
                  <div class="adm-stat-val price">${apt.price || 0}\u20ac</div>
                  <div class="adm-stat-label">\u0627\u0644\u0625\u064a\u062c\u0627\u0631 \u0627\u0644\u0634\u0647\u0631\u064a</div>
                </div>
                <div class="adm-stat">
                  <div class="adm-stat-val">${apt.rooms || '\u2014'}</div>
                  <div class="adm-stat-label">\u063a\u0631\u0641\u0629</div>
                </div>
                <div class="adm-stat">
                  <div class="adm-stat-val">${apt.size ? apt.size + ' \u0645\u00b2' : '\u2014'}</div>
                  <div class="adm-stat-label">\u0627\u0644\u0645\u0633\u0627\u062d\u0629</div>
                </div>
              </div>
              <div class="adm-features">${featHtml}</div>
              ${notesHtml}
              <div class="adm-meta">
                <span>\u{1f4c5} \u0623\u0636\u064a\u0641: ${formatDate(apt.addedAt)}</span>
                ${apt.publishedAt ? '<span>\u{1f4cc} \u0646\u0634\u0631: ' + formatDate(apt.publishedAt) + '</span>' : ''}
                <span>\u{1f4cd} ${escapeHtml(apt.area)}</span>
                <span>\u{1f3f7}\ufe0f ${escapeHtml(apt.category)}</span>
              </div>
              <div class="adm-actions">
                ${apt.url ? `<a href="${escapeHtml(apt.url)}" target="_blank" rel="noreferrer" class="adm-btn-primary">\u{1f310} \u0639\u0631\u0636 \u0639\u0644\u0649 ${escapeHtml(apt.source)}</a>` : ''}
                <button class="adm-btn-secondary" onclick="closeAptDetail()">\u2716 \u0625\u063a\u0644\u0627\u0642</button>
              </div>
            </div>
          `;
          overlay.classList.add('active');
          modal.classList.add('active');
        }

        window.closeAptDetail = function() {
          overlay.classList.remove('active');
          modal.classList.remove('active');
          modal.innerHTML = '';
        };

        overlay.addEventListener('click', window.closeAptDetail);
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') window.closeAptDetail();
        });

        // Fetch apartment data for the modal
        async function loadAptCache() {
          try {
            const res = await fetch('/api/apartments');
            aptCache = await res.json();
          } catch(e) {}
        }
        loadAptCache();
        setInterval(loadAptCache, 30000);

        // Attach click to cards
        function addCardClick() {
          document.querySelectorAll('[data-testid^="card-apartment-"]').forEach(card => {
            if (card.dataset.cardClickBound) return;
            card.dataset.cardClickBound = '1';
            card.addEventListener('click', function(e) {
              if (e.target.closest('button, a, input, select, textarea')) return;
              const testId = card.getAttribute('data-testid');
              const id = testId ? parseInt(testId.replace('card-apartment-', '')) : null;
              if (!id) return;
              const apt = aptCache.find(a => a.id === id);
              if (apt) openDetail(apt);
            });
          });
        }
        const observer = new MutationObserver(() => setTimeout(addCardClick, 150));
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root) observer.observe(root, { childList: true, subtree: true });
          addCardClick();
        }, 2000);
      })();
    </script>
  <script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
