    <script>
      // Area filter: intercept fetch to add ?area= parameter
      (function() {
        const currentArea = localStorage.getItem('selectedArea') || 'all';
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
          if (typeof url === 'string' && url.includes('/api/apartments') && !url.includes('?area=') && !url.includes('&area=')) {
            const separator = url.includes('?') ? '&' : '?';
            url = url + separator + 'area=' + encodeURIComponent(currentArea);
          }
          return originalFetch.call(this, url, options);
        };
      })();
    </script>
    <script>
      // Notification + Sound for new apartments
      (function() {

        const SOUND_URL = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAAD/AP8A/wD/AP8A/wD+AP4A/gD+APwA/AD8APwA+gD6APoA+gD4APgA+AD4APYA9gD2APYA9ADzAPQA9ADyAPIA8gDyAPAA8ADwAPAA7gDuAO4A7gDsAOwA7ADsAOoA6gDqAOoA6ADmAOYA5gDkAOIA4gDiAOAA3gDeAN4A3ADYANQA1ADQAM4AzADKAMgAxgDCAMIAwAC+ALwAugC6ALgAtgC0ALQAsgCwALAAsgC4AL4AxADKANIA2ADeAOQA6gDwAPQA+AD6APwA/AD8APwA/AD8APwA/AD+AP4A/gD+AP4AAAEAAQABAAEAAQABAgECAQIBAgECAQIBAgECAQIBAgECAQIBAgEAAQABAAEAAQABAAH+AP4A/gD+APwA/AD8APwA+gD6APoA+gD4APgA+AD4APYA9gD0APQA';

        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }

        function playSound() {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            // Play a pleasant notification chime
            [523.25, 659.25, 783.99].forEach((freq, i) => {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.frequency.value = freq;
              osc.type = 'sine';
              gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
              gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
              osc.start(ctx.currentTime + i * 0.15);
              osc.stop(ctx.currentTime + i * 0.15 + 0.4);
            });
          } catch(e) {}
        }

        function checkNew() {
          fetch('/api/apartments')
            .then(r => r.json())
            .then(apts => {
              const newApts = apts.filter(a => a.isNew);
              const count = newApts.length;
              if (lastCount === -1) { lastCount = count; return; }
              if (count > lastCount) {
                const diff = count - lastCount;
                document.title = '🔴 ' + diff + ' شقة جديدة! - شقق بوكستيهودة 2026';
                playSound();
                if ('Notification' in window && Notification.permission === 'granted') {
                  const n = new Notification('🏠 شقق جديدة في بوكستيهودة!', {

                  n.onclick = () => { window.focus(); n.close(); };
                }
                setTimeout(() => { document.title = 'شقق بوكستيهودة 2026'; }, 30000);
              }
              lastCount = count;
            })
            .catch(() => {});
        }

        setInterval(checkNew, 60000); // check every 1 minute
        setTimeout(checkNew, 3000); // initial check after 3s

    <script>
      // Area filter bar logic
      (function() {
        const currentArea = localStorage.getItem('selectedArea') || 'all';
        const buttons = document.querySelectorAll('#area-filter-bar .area-btn');
        buttons.forEach(btn => {
          if (btn.dataset.area === currentArea) btn.classList.add('active');
          btn.addEventListener('click', () => {
            const area = btn.dataset.area;
            localStorage.setItem('selectedArea', area);
            location.reload();
          });
        });

        // Fetch counts for each area and display
        async function loadCounts() {
          try {
            const res = await fetch('/api/apartments?area=all');
            const apts = await res.json();
            const counts = { all: apts.length, Buxtehude: 0, Neukloster: 0, 'Neu Wulmstorf': 0 };
            apts.forEach(a => { if (counts[a.area] !== undefined) counts[a.area]++; });
            buttons.forEach(btn => {
              const c = counts[btn.dataset.area];
              if (c !== undefined) {
                const span = document.createElement('span');
                span.className = 'area-count';
                span.textContent = c;
                btn.appendChild(span);
              }
            });
          } catch(e) {}
        }
        setTimeout(loadCounts, 1000);
      })();
    </script>
    <script>
      // Telegram settings panel logic
      (function() {
        const settingsBtn = document.getElementById('settings-btn');
        const panel = document.getElementById('settings-panel');
        const overlay = document.getElementById('settings-overlay');
        const saveBtn = document.getElementById('save-tg-settings');
        const status = document.getElementById('tg-status');
        const boxes = {
          Buxtehude: document.getElementById('tg-buxtehude'),
          Neukloster: document.getElementById('tg-neukloster'),
          'Neu Wulmstorf': document.getElementById('tg-neuwulmstorf')
        };

        function openPanel() {
          panel.style.display = 'block';
          overlay.style.display = 'block';
          status.style.display = 'none';
          // Load current settings
          fetch('/api/settings/telegram-areas').then(r => r.json()).then(data => {
            Object.keys(boxes).forEach(k => {
              boxes[k].checked = data.areas.includes(k);
            });
          }).catch(() => {});
        }
        function closePanel() {
          panel.style.display = 'none';
          overlay.style.display = 'none';
        }

        settingsBtn.addEventListener('click', openPanel);
        overlay.addEventListener('click', closePanel);

        saveBtn.addEventListener('click', () => {
          const selected = Object.keys(boxes).filter(k => boxes[k].checked);
          fetch('/api/settings/telegram-areas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ areas: selected })
          }).then(r => r.json()).then(data => {
            status.textContent = '✅ تم الحفظ! الإشعارات: ' + (data.areas.length ? data.areas.join(', ') : 'مغلقة');
            status.style.display = 'block';
            setTimeout(closePanel, 1500);
          }).catch(() => {
            status.textContent = '❌ فشل الحفظ';
            status.style.display = 'block';
            status.style.color = '#ef4444';
          });
        });
      })();
    </script>
  <script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
